<!DOCTYPE html>
<html>

<head>
    <title>IITGN Library Search</title>

    <link href="bootstrap/bootstrap.min.css" rel="stylesheet">

    <link href="style.css" rel="stylesheet">
</head>

<body>

    <div class="container mt-5">

        <h2>IITGN Semantic Library Search</h2>

        <div class="row mt-4">

            <div class="col-md-8">
                <input id="query" class="form-control" placeholder="Search papers">
            </div>

            <div class="col-md-2">
                <select id="topk" class="form-select">
                    <option value="50">50</option>
                    <option value="100" selected>100</option>
                    <option value="250">250</option>
                    <option value="500">500</option>
                </select>
            </div>

            <div class="col-md-2">
                <button onclick="search()" class="btn btn-primary w-100">
                    Search
                </button>
            </div>

        </div>

        <hr>

        <div class="row">

            <div class="col-md-3">

                <h5>Filters</h5>

                <input id="journal" class="form-control mb-2" placeholder="Journal">

                <input id="publisher" class="form-control mb-2" placeholder="Publisher">

                <input id="year" class="form-control mb-2" placeholder="Year">

                <button onclick="applyFilters()" class="btn btn-secondary w-100">
                    Apply
                </button>

            </div>

            <div class="col-md-9">

                <div id="stats"></div>

                <div id="results"></div>

            </div>

        </div>

    </div>

    <script src="search.js"></script>

</body>

</html>
